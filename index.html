<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>119 응급실 안내 — EMRIS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* === Design tokens v2 (도입 — 사용처는 Step 2 이후 점진 마이그레이션) === */

    /* Color tokens — 모노크롬 + accent 1색 */
    --t-bg:           #fafaf8;
    --t-surface:      #ffffff;
    --t-ink:          #0a0a0a;
    --t-dim:          #6b6b68;
    --t-line:         rgba(10, 10, 10, 0.12);
    --t-line-soft:    rgba(10, 10, 10, 0.06);
    --t-accent:       #a8231c;
    --t-accent-soft:  rgba(168, 35, 28, 0.08);

    /* Tier 색 — 챗봇·Pre-KTAS 공유 */
    --t-tier-regional:           #a8231c;
    --t-tier-local-center:       #8b4238;
    --t-tier-local-institution:  #5a4a42;

    /* 시술 가용성 색 (의미 보존, 톤 정렬) */
    --t-state-available:    #1d6b3f;
    --t-state-conditional:  #9a6409;
    --t-state-unavailable:  #a8231c;
    --t-state-unsupported:  #9ca3af;
    --t-state-blocked:      #5b21b6;

    /* Spacing — 4px grid */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-7: 32px; --sp-8: 48px;

    /* Radius — sharp corners 정책 (라운드 0~2px) */
    --r-0: 0;
    --r-1: 2px;

    /* Font */
    --t-font-sans: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Helvetica Neue", sans-serif;
    --t-font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;

    /* Type scale */
    --fs-xs:  11px; --fs-sm:  12px; --fs-md:  13px; --fs-base: 14px;
    --fs-lg:  15px; --fs-xl:  17px; --fs-2xl: 22px; --fs-3xl: 30px;

    /* Transitions */
    --t-fast: 0.12s; --t-mid: 0.2s;

    /* === Legacy alias (값은 v2 디자인 토큰으로 매핑됨) === */
    --bg: var(--t-surface);          /* 카드·input 배경 = 흰색 */
    --surface: var(--t-bg);          /* secondary 배경 = 베이지 */
    --border: var(--t-line);
    --text: var(--t-ink);
    --muted: var(--t-dim);
    --accent: var(--t-accent);
    --accent-light: var(--t-accent-soft);
    --user-bg: var(--t-ink);
    --user-text: #ffffff;
    --bot-bg: var(--t-bg);
    --bot-text: var(--t-ink);
    --available: var(--t-state-available);
    --conditional: var(--t-state-conditional);
    --unavailable: var(--t-state-unavailable);
    --unsupported: var(--t-state-unsupported);
    --blocked: var(--t-state-blocked);
  }

  html, body { height: 100%; }

  body {
    font-family: var(--t-font-sans);
    background: var(--t-bg);
    color: var(--text);
    display: flex;
    align-items: stretch;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-feature-settings: "tnum";
  }

  #app {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    background: var(--t-surface);
    border-left: 1px solid var(--t-line);
    border-right: 1px solid var(--t-line);
  }

  @media (max-width: 640px) {
    body { background: var(--bg); }
    #app { box-shadow: none; max-width: 100%; }
  }

  header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    gap: 8px;
  }
  header .logo { font-size: var(--fs-lg); font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
  #ai-toggle {
    padding: 4px 10px;
    font-size: var(--fs-xs);
    font-weight: 700;
    border: 1px solid var(--t-line);
    border-radius: var(--r-0);
    background: var(--t-surface);
    color: var(--t-dim);
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  #ai-toggle:hover { border-color: var(--t-ink); color: var(--t-ink); }
  #ai-toggle.active {
    background: var(--t-ink);
    color: #ffffff;
    border-color: var(--t-ink);
  }

  /* 헤더 액션 버튼 (새 케이스 / 기록) */
  .hd-btn {
    padding: 4px 10px;
    font-size: var(--fs-xs);
    font-weight: 700;
    border: 1px solid var(--t-line);
    border-radius: var(--r-0);
    background: var(--t-surface);
    color: var(--t-dim);
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
    white-space: nowrap;
    letter-spacing: 0.02em;
    font-family: inherit;
  }
  .hd-btn:hover { border-color: var(--t-ink); color: var(--t-ink); }
  .hd-btn:active { background: var(--t-bg); }

  /* 기록 drawer */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0.42);
    opacity: 0;
    visibility: hidden;
    transition: opacity var(--t-mid), visibility 0s var(--t-mid);
    z-index: 90;
  }
  .drawer-backdrop.open { opacity: 1; visibility: visible; transition: opacity var(--t-mid); }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(360px, 90vw);
    background: var(--t-surface);
    border-right: 1px solid var(--t-line);
    box-shadow: 0 0 30px rgba(10,10,10,0.18);
    transform: translateX(-105%);
    transition: transform var(--t-mid);
    z-index: 100;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    flex: 0 0 auto;
    padding: 14px 16px;
    border-bottom: 1px solid var(--t-line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title {
    font-size: var(--fs-md);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--t-ink);
  }
  .drawer-close {
    border: none;
    background: none;
    cursor: pointer;
    font-size: var(--fs-lg);
    color: var(--t-dim);
    padding: 4px 8px;
    transition: color var(--t-fast);
  }
  .drawer-close:hover { color: var(--t-ink); }
  .drawer-meta {
    padding: 10px 16px;
    font-size: var(--fs-xs);
    color: var(--t-dim);
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--t-line-soft);
  }
  .drawer-list {
    list-style: none;
    margin: 0; padding: 0;
    overflow-y: auto;
    flex: 1 1 auto;
  }
  .case-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--t-line-soft);
    cursor: pointer;
    transition: background var(--t-fast);
    display: grid;
    gap: 4px;
  }
  .case-item:hover { background: var(--t-bg); }
  .case-item.active { background: var(--t-bg); border-left: 3px solid var(--t-accent); padding-left: 13px; }
  .case-item .ci-summary {
    font-size: var(--fs-md);
    font-weight: 600;
    color: var(--t-ink);
    line-height: 1.35;
  }
  .case-item .ci-meta {
    font-size: var(--fs-xs);
    color: var(--t-dim);
    display: flex;
    gap: 10px;
    letter-spacing: 0.02em;
  }
  .case-item .ci-meta .mode-chip {
    font-family: var(--t-font-mono);
    padding: 1px 5px;
    border: 1px solid var(--t-line);
    color: var(--t-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .case-item .ci-meta .ci-status-active {
    color: var(--t-accent);
    font-weight: 700;
  }
  .case-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--t-dim);
    font-size: var(--fs-md);
    line-height: 1.55;
  }
  header .header-right {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
  }
  header .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s infinite;
    margin-right: 4px;
    vertical-align: middle;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-radius: var(--r-1);
    max-width: 78%;
    border: 1px solid var(--user-bg);
  }
  .msg.bot .bubble {
    background: var(--t-surface);
    color: var(--bot-text);
    border-radius: var(--r-1);
    max-width: 92%;
    border: 1px solid var(--t-line);
  }
  .bubble {
    padding: 10px 14px;
    font-size: var(--fs-base);
    line-height: 1.55;
    word-break: keep-all;
  }

  .chip {
    padding: 9px 12px;
    border: 1px solid var(--t-line);
    border-radius: var(--r-0);
    font-size: var(--fs-md);
    cursor: pointer;
    background: var(--t-surface);
    color: var(--t-ink);
    transition: background var(--t-fast), border-color var(--t-fast);
    white-space: normal;
    text-align: left;
    line-height: 1.4;
    width: 100%;
    font-family: inherit;
  }
  .chip:hover { background: var(--t-bg); border-color: var(--t-ink); }

  .result-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 58px;
  }
  .result-header { font-size: 14px; color: var(--muted); }
  .result-header strong { color: var(--text); font-size: 16px; }
  .result-latency {
    position: absolute;
    top: 10px;
    right: 12px;
    font-family: var(--t-font-mono);
    font-size: 11px;
    line-height: 1;
    color: var(--t-dim);
    background: var(--t-bg);
    border: 1px solid var(--t-line);
    padding: 4px 6px;
    white-space: nowrap;
    pointer-events: none;
  }
  .hospital-section { margin-bottom: 6px; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .hospital-card {
    padding: 12px 14px;
    border: 1px solid var(--t-line);
    border-radius: var(--r-0);
    margin-bottom: 8px;
    background: var(--t-surface);
  }
  .hospital-card.available { border-left: 3px solid var(--available); }
  .hospital-card.conditional { border-left: 3px solid var(--conditional); }
  .hospital-card.unavailable { border-left: 3px solid var(--unavailable); }
  .hospital-card.unsupported { border-left: 3px solid var(--unsupported); opacity: 0.7; }
  .hospital-card.blocked { border-left: 3px solid var(--blocked); opacity: 0.7; }

  .hcard-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .hcard-name { font-size: var(--fs-lg); font-weight: 700; letter-spacing: -0.01em; }
  .badge {
    font-size: var(--fs-xs);
    padding: 2px 6px;
    border-radius: var(--r-0);
    font-weight: 700;
    background: var(--t-bg);
    color: var(--t-dim);
    border: 1px solid var(--t-line);
    letter-spacing: 0.04em;
  }
  .badge.A { background: var(--t-ink); color: #ffffff; border-color: var(--t-ink); }
  .badge.C { background: var(--t-surface); color: var(--t-ink); border-color: var(--t-ink); }
  .verdict-icon { margin-left: auto; font-size: 16px; }
  .hcard-tel { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 600; display: block; margin-bottom: 3px; }
  .hcard-beds { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .hcard-beds .beds-ok { color: var(--available); }
  .hcard-beds .beds-low { color: var(--conditional); }
  .hcard-beds .beds-none { color: var(--unavailable); }
  .hcard-conditions { font-size: 13px; color: var(--conditional); margin-top: 4px; line-height: 1.5; }
  .hcard-unavail { font-size: 13px; color: var(--unavailable); margin-top: 4px; }
  .hcard-disease { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .unsupported-list { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .disclaimer {
    font-size: var(--fs-sm);
    color: var(--t-dim);
    padding: 10px 12px;
    background: var(--t-bg);
    border: 1px solid var(--t-line);
    border-radius: var(--r-0);
    line-height: 1.55;
  }

  #ribbon { flex-shrink: 0; background: var(--t-surface); border-bottom: 1px solid var(--t-line); }
  .ribbon-wrap {
    position: relative;
  }
  .ribbon-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 6px 10px;
    scrollbar-width: none;
    cursor: grab;
    scroll-behavior: smooth;
  }
  .ribbon-row.dragging {
    cursor: grabbing;
    user-select: none;
    scroll-behavior: auto;
  }
  .ribbon-row::-webkit-scrollbar { display: none; }
  .ribbon-arrow {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30px;
    border: none;
    color: var(--t-ink);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    z-index: 2;
    transition: opacity var(--t-fast);
  }
  .ribbon-arrow.show { display: flex; }
  .ribbon-arrow.ribbon-arrow-left {
    left: 0;
    background: linear-gradient(to right, var(--t-surface) 60%, rgba(255,255,255,0));
  }
  .ribbon-arrow.ribbon-arrow-right {
    right: 0;
    background: linear-gradient(to left, var(--t-surface) 60%, rgba(255,255,255,0));
  }
  .ribbon-arrow:hover { color: var(--t-accent); }
  .ribbon-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    font-size: var(--fs-md);
    border: 1px solid transparent;
    background: none;
    color: var(--t-dim);
    cursor: pointer;
    border-radius: var(--r-0);
    white-space: nowrap;
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
    font-family: inherit;
  }
  .ribbon-btn:hover { background: var(--t-bg); color: var(--t-ink); }
  .ribbon-btn.selected { background: var(--t-ink); color: #ffffff; font-weight: 700; }

  /* 입력 모드 토글 (Phase 6 Step 6) */
  .mode-toggle {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 1px solid var(--t-line);
    background: var(--t-bg);
  }
  .mode-btn {
    padding: 10px 12px;
    border: none;
    background: transparent;
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--t-dim);
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast);
    font-family: inherit;
    letter-spacing: 0.02em;
    border-bottom: 2px solid transparent;
  }
  .mode-btn:hover { background: var(--t-surface); }
  .mode-btn.active {
    background: var(--t-surface);
    color: var(--t-ink);
    border-bottom-color: var(--t-accent);
    font-weight: 700;
  }

  /* Pre-KTAS 패널 placeholder */
  #wizard-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--t-line);
    background: var(--t-surface);
    padding: 14px 16px;
    max-height: 60vh;
    overflow-y: auto;
  }
  #wizard-panel[hidden] { display: none !important; }

  /* hidden 속성 우선 — display:flex/grid 오버라이드 */
  #input-bar[hidden], #chips-bar[hidden], #wizard-panel[hidden] { display: none !important; }
  .wizard-placeholder {
    color: var(--t-dim);
    font-size: var(--fs-sm);
    text-align: center;
    padding: 24px;
    border: 1px dashed var(--t-line);
  }

  /* Wizard 인라인 컴포넌트 (Phase 6 Step 7) */
  .wiz-head {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 10px; border-bottom: 1px solid var(--t-line);
    margin-bottom: 10px;
  }
  .wiz-code-strip {
    font-family: var(--t-font-mono);
    font-size: var(--fs-xl);
    font-weight: 700; letter-spacing: 0.08em;
    display: flex; gap: 3px;
  }
  .wiz-ch { min-width: 13px; text-align: center; color: var(--t-ink); }
  .wiz-ch.empty { color: var(--t-line); }
  .wiz-step {
    font-size: var(--fs-xs); font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--t-dim); margin-left: auto;
  }
  .wiz-back {
    border: 1px solid var(--t-line); background: var(--t-surface);
    padding: 4px 10px; font-size: var(--fs-xs); cursor: pointer;
    color: var(--t-dim); border-radius: var(--r-0);
    font-family: inherit; letter-spacing: 0.04em;
  }
  .wiz-back:hover { border-color: var(--t-ink); color: var(--t-ink); }

  .wiz-prompt {
    font-size: var(--fs-base); font-weight: 700;
    color: var(--t-ink); margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .wiz-grid { display: grid; gap: 6px; margin-bottom: 12px; }
  .wiz-cols-1 { grid-template-columns: 1fr; }
  .wiz-cols-2 { grid-template-columns: 1fr 1fr; }
  .wiz-cols-3 { grid-template-columns: repeat(3, 1fr); }

  .wiz-btn {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 2px; padding: 10px 12px; min-height: 48px;
    border: 1px solid var(--t-line); background: var(--t-surface);
    text-align: left; cursor: pointer;
    transition: border-color var(--t-fast), background var(--t-fast);
    font-family: inherit; border-radius: var(--r-0);
  }
  .wiz-btn:hover { background: var(--t-bg); border-color: var(--t-ink); }
  .wiz-btn.primary { border-color: var(--t-ink); }
  .wiz-btn-code { font-family: var(--t-font-mono); font-size: var(--fs-xs); color: var(--t-dim); letter-spacing: 0.04em; }
  .wiz-btn-label { font-size: var(--fs-md); font-weight: 600; line-height: 1.3; }
  .wiz-btn-grade { font-family: var(--t-font-mono); font-size: var(--fs-xs); font-weight: 700; color: var(--t-accent); }

  .wiz-ctx {
    border: 1px solid var(--t-ink); background: var(--t-surface);
    padding: 10px 12px; margin-bottom: 12px; display: grid; gap: 4px;
  }
  .wiz-ctx-title { font-size: var(--fs-xs); letter-spacing: 0.12em; text-transform: uppercase; color: var(--t-dim); font-weight: 700; }
  .wiz-ctx-code { display: flex; align-items: baseline; gap: 8px; }
  .wiz-ctx-mono { font-family: var(--t-font-mono); font-size: var(--fs-xl); font-weight: 800; letter-spacing: 0.06em; }
  .wiz-ctx-grade { font-family: var(--t-font-mono); font-size: var(--fs-xs); padding: 2px 6px; border: 1px solid var(--t-accent); color: var(--t-accent); font-weight: 700; }
  .wiz-ctx-path { font-size: var(--fs-sm); color: var(--t-ink); }
  .wiz-ctx-sub { font-size: var(--fs-xs); letter-spacing: 0.08em; text-transform: uppercase; color: var(--t-dim); font-weight: 700; margin-top: 4px; }
  .wiz-ctx-y { display: grid; grid-template-columns: 50px 1fr; gap: 8px; font-size: var(--fs-sm); padding: 1px 0; }
  .wiz-ctx-y .wiz-ctx-mono { font-size: var(--fs-sm); }
  .wiz-ctx-y.dimmed { opacity: 0.4; text-decoration: line-through; }

  .wiz-q { border: 1px solid var(--t-line); background: var(--t-surface); padding: 10px 12px; margin-bottom: 8px; display: grid; gap: 6px; }
  .wiz-q-prompt { font-size: var(--fs-md); font-weight: 700; }
  .wiz-q-purpose { font-size: var(--fs-xs); color: var(--t-dim); }
  .wiz-q-opts { display: grid; gap: 4px; }
  .wiz-q-opt {
    padding: 8px 10px; border: 1px solid var(--t-line); background: var(--t-surface);
    text-align: left; font-size: var(--fs-sm); cursor: pointer; font-family: inherit;
    border-radius: var(--r-0);
  }
  .wiz-q-opt:hover { background: var(--t-bg); }
  .wiz-q-opt.selected { background: var(--t-ink); color: #ffffff; border-color: var(--t-ink); font-weight: 700; }
  .wiz-q-next {
    margin-top: 8px; padding: 6px 10px; border: 1px solid var(--t-ink); background: var(--t-surface);
    font-size: var(--fs-sm); cursor: pointer; font-family: inherit; font-weight: 600;
    border-radius: var(--r-0);
  }

<script>
/* ════════════════════════════════════════════════════════════════════
 * CaseStore — 케이스 단위 localStorage 저장소 (브라우저 독립)
 * 데모 동시 접속자 간 동기화 없음. 각 브라우저 자체 history.
 * Step 3 (Phase 6 리팩터). 사용은 Step 5에서 sendMessage에 연결.
 * ════════════════════════════════════════════════════════════════════ */
(function initCaseStore() {
  'use strict';

  const KEY_CASES = 'emris_cases_v1';
  const KEY_ACTIVE = 'emris_active_case_id';
  const CAP = 50;

  function nowMs() { return Date.now(); }
  function newId() {
    const d = new Date();
    const stamp = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0')
                + '-' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
    const rand = Math.random().toString(36).slice(2, 8);
    return 'case-' + stamp + '-' + rand;
  }

  function safeParse(raw, fallback) {
    if (!raw) return fallback;
    try { return JSON.parse(raw); } catch (e) { return fallback; }
  }

  function loadAll() {
    const arr = safeParse(localStorage.getItem(KEY_CASES), []);
    return Array.isArray(arr) ? arr : [];
  }
  function saveAll(arr) {
    // FIFO eviction: cap 초과 시 가장 오래된 closed case부터 제거
    if (arr.length > CAP) {
      const sortedClosed = arr.filter(c => c.ts_closed).sort((a,b) => (a.ts_closed||0) - (b.ts_closed||0));
      const toRemove = arr.length - CAP;
      const removeIds = new Set(sortedClosed.slice(0, toRemove).map(c => c.id));
      arr = arr.filter(c => !removeIds.has(c.id));
    }
    try { localStorage.setItem(KEY_CASES, JSON.stringify(arr)); }
    catch (e) { console.warn('[CaseStore] localStorage write failed:', e); }
  }
  function getActiveId() {
    return localStorage.getItem(KEY_ACTIVE) || null;
  }
  function setActiveId(id) {
    if (id) localStorage.setItem(KEY_ACTIVE, id);
    else localStorage.removeItem(KEY_ACTIVE);
  }

  // ── Public API ──
  const CaseStore = {

    /** 모든 케이스 (최신 시작순) */
    list() {
      return loadAll().slice().sort((a,b) => (b.ts_started||0) - (a.ts_started||0));
    },

    /** id로 단일 케이스 read-only */
    get(id) {
      return loadAll().find(c => c.id === id) || null;
    },

    /** 현재 진행 중 active case (없으면 null) */
    getActive() {
      const id = getActiveId();
      if (!id) return null;
      return this.get(id);
    },

    /**
     * 새 케이스 시작.
     * 기존 active가 있으면 자동 archive (ts_closed 찍음).
     * @param {{input_mode:'wizard'|'chat', summary?:string, patient?:object, region?:string}} opts
     * @returns {object} 새 case
     */
    startNew(opts = {}) {
      const all = loadAll();
      // 기존 active mark closed
      const prevId = getActiveId();
      if (prevId) {
        const prev = all.find(c => c.id === prevId);
        if (prev && !prev.ts_closed) prev.ts_closed = nowMs();
      }
      const c = {
        id: newId(),
        ts_started: nowMs(),
        ts_closed: null,
        input_mode: opts.input_mode || 'chat',
        summary: opts.summary || '',
        patient: opts.patient || null,
        assessment: opts.assessment || null,
        region: opts.region || null,
        messages: [],
        hospitals_snapshot: null,
      };
      all.push(c);
      saveAll(all);
      setActiveId(c.id);
      return c;
    },

    /** active case의 messages에 append. {role,content,...meta} */
    appendMessage(message) {
      const id = getActiveId();
      if (!id) return false;
      const all = loadAll();
      const c = all.find(x => x.id === id);
      if (!c) return false;

      const m = new Map();
      for (const e of es) { if (e.l2c !== l2c) continue; if (!m.has(e.l3c)) m.set(e.l3c, e.l3n); }

        if (!eff || !eff.options) continue;
        const ans = state.answers[qid];
        // v0.3 multi_select: ans는 배열. 단일은 number.
        const optIndices = eff.multi_select && Array.isArray(ans) ? ans
          : (typeof ans === 'number' ? [ans] : []);
        for (const idx of optIndices) {
          const opt = eff.options[idx];
          if (!opt) continue;
          if (opt.y_keep) {
            const keepSet = new Set(opt.y_keep);
            for (const y of Array.from(kept)) if (!keepSet.has(y)) { kept.delete(y); removed.add(y); }
          }
          if (opt.y_remove) {
            for (const y of opt.y_remove) if (kept.has(y)) { kept.delete(y); removed.add(y); }
          }
        }
      }
      return { kept: Array.from(kept), removed };
    }

    function computeTier(ycodes, grade) {
      const D = window.PrektasData;
      if (ycodes.length > 0) {
        const firstOrder = D.yTier[ycodes[0]].slice();
        let accept = new Set(firstOrder);
        for (let i = 1; i < ycodes.length; i += 1) {
          const s = new Set(D.yTier[ycodes[i]]);
          accept = new Set([...accept].filter(x => s.has(x)));
        }
        const ordered = firstOrder.filter(x => accept.has(x));
        return { acceptable: ordered, preferred: ordered[0] };
      }
      // v0.3: Y후보 비어있을 때 rec[code].t (conservative shift 반영)을 우선
      if (state && state.code && D.rec[state.code] && D.rec[state.code].t) {
        const t = D.rec[state.code].t;
        return { acceptable: t.acceptable || [], preferred: t.preferred };
      }
      if (grade === 1 || grade === 2) return { acceptable: ['regional','local_center'], preferred: 'regional' };
      if (grade === 3) return { acceptable: ['local_center','local_institution'], preferred: 'local_center' };
      return { acceptable: ['local_institution','local_center'], preferred: 'local_institution' };
    }

    // v0.3 신규: question 답변에서 equipment_dimensions tags 수집
    function collectEquipmentTags() {
      const D = window.PrektasData;
      const tags = new Set();
      let tierOverride = null;
      for (const qid of Object.keys(state.answers || {})) {
        const eff = D.questionEffects[qid];
        if (!eff || !eff.options) continue;
        const ans = state.answers[qid];
        const optList = eff.multi_select && Array.isArray(ans) ? ans : (ans !== undefined && ans !== null ? [ans] : []);
        for (const idx of optList) {
          const opt = eff.options[idx];
          if (!opt) continue;
          if (opt.tags) opt.tags.forEach(t => tags.add(t));
          if (opt.tier_override) tierOverride = opt.tier_override;
        }
      }
      return { tags: Array.from(tags), tierOverride };
    }

    function makeBtn(opts) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'wiz-btn' + (opts.primary ? ' primary' : '');

        const c = document.createElement('span'); c.className = 'wiz-btn-code'; c.textContent = opts.code; b.appendChild(c);
      }
      const lbl = document.createElement('span'); lbl.className = 'wiz-btn-label'; lbl.textContent = opts.label; b.appendChild(lbl);
      if (opts.grade != null) {
        const g = document.createElement('span'); g.className = 'wiz-btn-grade'; g.textContent = 'g' + opts.grade; b.appendChild(g);
      }
      b.addEventListener('click', opts.onClick);

    }

    function renderHeader(panel) {

    function goBack() {
      if (state.stage === 'l2') state.stage = 'group';
      else if (state.stage === 'l3') state.stage = 'l2';
      else if (state.stage === 'l4') state.stage = 'l3';
      else if (state.stage === 'questions') state.stage = 'l4';
      else if (state.stage === 'submit') state.stage = 'questions';
      render();
    }

    function renderStageGroup(panel) {
      const prompt = document.createElement('div');
      prompt.className = 'wiz-prompt'; prompt.textContent = '연령군을 선택하세요';
      panel.appendChild(prompt);

      grid.appendChild(makeBtn({ code: 'C', label: '성인', primary: true, onClick: () => { state.group = 'adult'; state.stage = 'l2'; render(); } }));
      grid.appendChild(makeBtn({ code: 'D', label: '소아', primary: true, onClick: () => { state.group = 'pediatric'; state.stage = 'l2'; render(); } }));

    function renderStageL2(panel) {

    function renderStageL3(panel) {

    function renderStageL4(panel) {
      const opts = uniqL4(byGroup[state.group], state.l2, state.l3);

          code: o.c, label: o.n, grade: o.gr,

    function renderStageQuestions(panel) {
      const D = window.PrektasData;
      const e = D.entries.find(x => x.c === state.code);
      const grade = e ? e.gr : 0;
      const { kept, removed } = currentCandidates();
      const tier = computeTier(kept, grade);

      // 컨텍스트 카드
      const ctx = document.createElement('div'); ctx.className = 'wiz-ctx';
      const title = document.createElement('div'); title.className = 'wiz-ctx-title'; title.textContent = '증상 요약';
      ctx.appendChild(title);
      const codeRow = document.createElement('div'); codeRow.className = 'wiz-ctx-code';
      const cs = document.createElement('span'); cs.className = 'wiz-ctx-mono'; cs.textContent = state.code; codeRow.appendChild(cs);
      const gs = document.createElement('span'); gs.className = 'wiz-ctx-grade'; gs.textContent = 'grade ' + grade; codeRow.appendChild(gs);
      ctx.appendChild(codeRow);
      const path = document.createElement('div'); path.className = 'wiz-ctx-path';
      path.textContent = e.l2n + ' · ' + e.l3n + ' · ' + e.l4n; ctx.appendChild(path);
      // Y 후보 row
      const baseline = D.rec[state.code] ? D.rec[state.code].y : [];
      if (baseline.length > 0) {
        const sub = document.createElement('div'); sub.className = 'wiz-ctx-sub'; sub.textContent = '초기 Y후보';
        ctx.appendChild(sub);
        for (const y of baseline) {
          const row = document.createElement('div'); row.className = 'wiz-ctx-y' + (removed.has(y) ? ' dimmed' : '');
          const c = document.createElement('span'); c.className = 'wiz-ctx-mono'; c.textContent = y; row.appendChild(c);
          const d = D.diseases.find(x => x.code === y);
          const lbl = document.createElement('span'); lbl.textContent = d ? d.label : '(정의 없음)'; row.appendChild(lbl);
          ctx.appendChild(row);
        }
      } else {
        const none = document.createElement('div'); none.className = 'wiz-ctx-sub';
        none.textContent = '27 Y코드 외 (grade ' + grade + ' 기반 tier 추천)';
        ctx.appendChild(none);
      }
      panel.appendChild(ctx);

      // 질문 카드들 (현재까지 진행된 만큼)
      const shown = Math.min(state.qIndex + 1, state.qids.length);
      for (let i = 0; i < shown; i += 1) {
        const qid = state.qids[i]; const q = D.questions[qid]; if (!q) continue;
        const eff = D.questionEffects[qid] || {};
        const isMulti = !!eff.multi_select;
        const card = document.createElement('div'); card.className = 'wiz-q';
        const pp = document.createElement('div'); pp.className = 'wiz-q-prompt';
        pp.textContent = '질문 ' + (i+1) + '/' + state.qids.length + ' · ' + q.prompt + (isMulti ? ' (해당 모두 선택)' : '');
        card.appendChild(pp);
        const pu = document.createElement('div'); pu.className = 'wiz-q-purpose'; pu.textContent = q.purpose; card.appendChild(pu);
        const opts = document.createElement('div'); opts.className = 'wiz-q-opts';
        const ans = state.answers[qid];
        const selectedSet = isMulti && Array.isArray(ans) ? new Set(ans) : null;
        // catalog options가 누락된 경우 effects 옵션 개수만큼 fallback 라벨 사용
        // 정상 데이터에서는 절대 발생하면 안 되므로 console에 경고를 남겨 빌드 정합성 회귀를 즉시 감지
        let optionLabels;
        if (Array.isArray(q.options) && q.options.length > 0) {
          optionLabels = q.options;
        } else if (Array.isArray(eff.options)) {
          optionLabels = eff.options.map((_, k) => '옵션 ' + (k + 1));
          console.warn('[wizard] question', qid, 'has no catalog options — falling back to generic labels. Check chatbot-payload regeneration.');
        } else {
          optionLabels = [];
          console.warn('[wizard] question', qid, 'has no options in catalog or effects.');
        }
        optionLabels.forEach((opt, idx) => {
          const btn = document.createElement('button'); btn.type = 'button';
          const isSel = isMulti ? (selectedSet && selectedSet.has(idx)) : (ans === idx);
          btn.className = 'wiz-q-opt' + (isSel ? ' selected' : '');
          btn.textContent = opt;
          btn.addEventListener('click', () => {
            if (isMulti) {
              const cur = Array.isArray(state.answers[qid]) ? state.answers[qid].slice() : [];
              const at = cur.indexOf(idx);
              if (at >= 0) cur.splice(at, 1); else cur.push(idx);
              state.answers[qid] = cur;
              render();
            } else {
              state.answers[qid] = idx;
              if (i === state.qIndex && state.qIndex < state.qids.length - 1) state.qIndex += 1;
              render();
            }
          });
          opts.appendChild(btn);
        });
        card.appendChild(opts);
        if (isMulti && i === state.qIndex && i < state.qids.length - 1) {
          const nextBtn = document.createElement('button'); nextBtn.type = 'button';
          nextBtn.className = 'wiz-q-next';
          nextBtn.textContent = '다음 질문 →';
          nextBtn.addEventListener('click', () => { state.qIndex += 1; render(); });
          card.appendChild(nextBtn);
        }
        panel.appendChild(card);
      }

      // Live tier preview
      const tierDef = D.tierDefinitions[tier.preferred];
      const live = document.createElement('div'); live.className = 'wiz-live';
      const llbl = document.createElement('div'); llbl.className = 'wiz-live-lbl'; llbl.textContent = '현재 추천';
      live.appendChild(llbl);
      const tn = document.createElement('div'); tn.className = 'wiz-live-tier ' + tier.preferred;
      tn.textContent = tierDef.label;
      if (tier.acceptable.length > 1) {
        const alt = document.createElement('span'); alt.className = 'wiz-live-alt';
        alt.textContent = ' + ' + D.tierDefinitions[tier.acceptable[1]].short + ' 가능';
        tn.appendChild(alt);
      }
      live.appendChild(tn);
      panel.appendChild(live);

      // 다음 단계로
      const sub = document.createElement('button'); sub.type = 'button'; sub.className = 'wiz-submit';
      sub.textContent = '병원 추천 받기 →';
      sub.addEventListener('click', () => { state.stage = 'submit'; render(); });
      panel.appendChild(sub);
    }

    function renderStageSubmit(panel) {
      const D = window.PrektasData;
      const e = D.entries.find(x => x.c === state.code);
      const grade = e.gr;
      const { kept } = currentCandidates();
      const tier = computeTier(kept, grade);
      const tierDef = D.tierDefinitions[tier.preferred];

      const prompt = document.createElement('div');
      prompt.className = 'wiz-prompt'; prompt.textContent = '확인·전송';
      panel.appendChild(prompt);

      const summary = document.createElement('div'); summary.className = 'wiz-ctx';
      const sline = (txt) => { const d = document.createElement('div'); d.className = 'wiz-ctx-path'; d.textContent = txt; return d; };
      summary.appendChild(sline('코드: ' + state.code + ' · grade ' + grade));
      summary.appendChild(sline('경로: ' + e.l2n + ' · ' + e.l3n + ' · ' + e.l4n));
      summary.appendChild(sline('Y후보: ' + (kept.length ? kept.join(', ') : '없음 (grade 기반 tier)')));
      summary.appendChild(sline('권장 tier: ' + tierDef.label + (tier.acceptable.length > 1 ? ' (+ ' + D.tierDefinitions[tier.acceptable[1]].short + ' 가능)' : '')));
      panel.appendChild(summary);

      // 지역 선택
      const rprompt = document.createElement('div'); rprompt.className = 'wiz-prompt';
      rprompt.textContent = '지역 선택 (선택 후 EMRIS 조회)'; panel.appendChild(rprompt);
      const rgrid = document.createElement('div'); rgrid.className = 'wiz-grid wiz-cols-3';
      for (const r of REGIONS) {
        const btn = document.createElement('button'); btn.type = 'button';
        btn.className = 'wiz-region' + (state.region === r.code ? ' selected' : '');
        btn.textContent = r.name;
        btn.addEventListener('click', () => { state.region = r.code; render(); });
        rgrid.appendChild(btn);
      }
      panel.appendChild(rgrid);

      const submit = document.createElement('button'); submit.type = 'button'; submit.className = 'wiz-submit';
      submit.disabled = !state.region;
      submit.textContent = state.region ? '병원 추천 시작 →' : '지역을 선택하세요';
      submit.addEventListener('click', () => {
        if (!state.region) return;
        // Step 8에서 합류 함수 runCaseFromInput 호출로 교체
        const payload = buildSubmitPayload();
        if (typeof runCaseFromInput === 'function') {
          runCaseFromInput(payload);
        } else {
          alert('Step 8 합류 함수 미구현 — payload:\n' + JSON.stringify(payload, null, 2).slice(0, 500));
        }
      });
      panel.appendChild(submit);
    }

    function buildSubmitPayload() {
      const D = window.PrektasData;
      const e = D.entries.find(x => x.c === state.code);
      const rec = D.rec[state.code] || { y: [], m: 'unmapped', yc: {}, t: null, qs: [], ct: [] };
      const baseline = rec.y;
      const { kept, removed } = currentCandidates();
      let tier = computeTier(kept, e.gr);
      const equip = collectEquipmentTags();
      // rosc_status 같은 tier_override가 있으면 우선 적용
      if (equip.tierOverride) {
        tier = {
          preferred: equip.tierOverride,
          acceptable: tier.acceptable.includes(equip.tierOverride) ? tier.acceptable : [equip.tierOverride, ...tier.acceptable],
        };
      }
      const formatAnswer = (qid, ans) => {
        const q = D.questions[qid]; if (!q) return String(ans);
        const eff = D.questionEffects[qid] || {};
        const isMulti = !!eff.multi_select;
        const optionLabels = (Array.isArray(q.options) && q.options.length > 0)
          ? q.options
          : Array.isArray(eff.options)
            ? eff.options.map((_, k) => '옵션 ' + (k + 1))
            : [];
        const labelOf = (i) => (typeof i === 'number' && optionLabels[i] != null) ? optionLabels[i] : ('옵션 ' + ((i|0) + 1));
        if (isMulti && Array.isArray(ans)) return ans.map(labelOf).join(' / ');
        if (typeof ans === 'number') return labelOf(ans);
        return String(ans);
      };
      const additional_qa = Object.keys(state.answers).map(qid => ({
        question: D.questions[qid] ? D.questions[qid].prompt : qid,
        answer: formatAnswer(qid, state.answers[qid]),
      }));
      const y_excluded_with_reason = Array.from(removed).map(y => ({
        code: y, reason: '추가 질문 답변에 따라 제외',
      }));
      // v0.3: confident vs candidate 분리
      const confident_y = kept.filter(y => rec.yc && rec.yc[y] === 'confident');
      const candidate_y = kept.filter(y => rec.yc && rec.yc[y] === 'candidate');
      return {
        mode: 'wizard',
        region: state.region,
        diseases: kept,
        prektas_context: {
          patient: {
            group: e.g === 'adult' ? '성인' : '소아',
            level2: e.l2n,
            level3: e.l3n,
            level4: e.l4n,
            pre_code: e.c,
            grade: e.gr,
          },
          additional_qa,
          rule_based: {
            mappability: rec.m,
            initial_y_candidates: baseline,
            narrowed_y_candidates: kept,
            confident_y_candidates: confident_y,
            candidate_y_candidates: candidate_y,
            c_tier_codes: rec.ct || [],
            y_excluded_with_reason,
            tier_recommendation: {
              preferred: tier.preferred,
              acceptable: tier.acceptable,
              source: rec.t ? rec.t.source : 'computed',
            },
            equipment_dimensions: equip.tags,
            cpr_special: !!rec.cpr,
          },
        },
      };
    }

    function render() {
      const panel = document.getElementById('wizard-panel');
      if (!panel) return;
      clearChildren(panel);
      if (!ensureData()) return;
      renderHeader(panel);
      const body = document.createElement('div'); body.className = 'wiz-body';
      panel.appendChild(body);
      if (state.stage === 'group') renderStageGroup(body);
      else if (state.stage === 'l2') renderStageL2(body);
      else if (state.stage === 'l3') renderStageL3(body);
      else if (state.stage === 'l4') renderStageL4(body);
      else if (state.stage === 'questions') renderStageQuestions(body);
      else if (state.stage === 'submit') renderStageSubmit(body);
      // 추가질문 단계: 새 질문/제출 버튼이 max-height 너머에 가려지지 않도록 끝까지 스크롤
      if (state.stage === 'questions' || state.stage === 'submit') {
        requestAnimationFrame(() => { panel.scrollTop = panel.scrollHeight; });
      }
    }

    function mount() {
      if (mounted) return;
      mounted = true;
      render();
    }

    function resetAndRender() {
      reset();
      render();
    }

    return { mount, render, reset: resetAndRender };
  })();
  window.WizardController = WizardController;

  // 안전하게 DOM 노드 비우기 (innerHTML XSS 회피)
  function clearChildren(el) {
    if (!el) return;
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  // ── Phase 7: LLM 점증 backoff 재시도 + 에러 카드 ──
  // CLAUDE.md 글로벌 규칙: incremental gap (1s, 3s, 5s, 10s, ...)
  // fetchFn 반환 타입: { ok, data?, status?, kind?, retryable?, message? }
  async function callLLMWithRetry(fetchFn, opts) {
    const o = opts || {};
    const maxAttempts = o.maxAttempts || 4;
    const gaps = [0, 1000, 3000, 5000, 10000];
    let lastErr = null;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const wait = gaps[attempt] || 10000;
      if (wait) await new Promise(function(r){ setTimeout(r, wait); });
      try {
        const result = await fetchFn();
        if (result && result.ok) return result;
        if (result && result.retryable === false) return result; // 401/403/429 — 재시도 무의미
        lastErr = result || { ok: false, kind: 'unknown', retryable: true };
      } catch (e) {
        lastErr = { ok: false, kind: 'network', message: String(e && e.message ? e.message : e), retryable: true };
      }
    }
    return lastErr || { ok: false, kind: 'unknown', retryable: true };
  }

  function llmErrorLabel(kind) {
    switch (kind) {
      case 'auth':       return 'API 인증 오류 (401/403)';
      case 'rate_limit': return '사용량 한도 초과 (429)';
      case 'network':    return '네트워크 연결 오류';
      case 'parse':      return '응답 파싱 실패';
      case '5xx':        return 'AI 서버 응답 오류';
      case '4xx':        return 'AI 요청 오류';
      default:           return '알 수 없는 오류';
    }
  }

  // 에러 카드: 재시도 버튼 + 진단 정보 (details 접힘)
  function renderLLMError(opts) {
    const o = opts || {};
    const card = el('div', { className: 'llm-error-card bubble' });

    const hdr = el('div', { className: 'lec-header' });
    hdr.textContent = '⚠ AI 분석을 불러오지 못했습니다';
    card.appendChild(hdr);

    const body = el('div', { className: 'lec-body' });
    body.textContent = '잠시 후 다시 시도해 주세요.';
    card.appendChild(body);

    if (typeof o.onRetry === 'function') {
      const btn = el('button', { className: 'lec-retry' });
      btn.type = 'button';
      btn.textContent = '🔄 다시 시도';
      btn.addEventListener('click', function() {
        btn.disabled = true;
        btn.textContent = '재시도 중…';
        try { o.onRetry(); } catch (e) { console.error('[renderLLMError] retry failed:', e); }
        // 카드 자체는 onRetry 결과가 새 메시지로 추가되도록 두고, 버튼만 비활성화
      });
      card.appendChild(btn);
    }

    if (o.error) {
      const det = document.createElement('details');
      det.className = 'lec-diagnostic';
      const sum = document.createElement('summary');
      sum.textContent = '진단 정보';
      det.appendChild(sum);
      const list = el('div', { className: 'lec-diag-list' });
      const line1 = el('div'); line1.textContent = '종류: ' + llmErrorLabel(o.error.kind || 'unknown'); list.appendChild(line1);
      if (o.error.status) {
        const line2 = el('div'); line2.textContent = 'HTTP: ' + o.error.status; list.appendChild(line2);
      }
      if (o.error.message) {
        const line3 = el('div'); line3.textContent = '메시지: ' + String(o.error.message).slice(0, 200); list.appendChild(line3);
      }
      det.appendChild(list);
      card.appendChild(det);
    }

    return card;
  }

  // ── 케이스 컨트롤 (Phase 6 Step 4): 새 케이스 + 기록 drawer ──
  function setupCaseControls() {
    const newBtn = document.getElementById('case-new-btn');
    const histBtn = document.getElementById('case-history-btn');
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('drawer-backdrop');
    const closeBtn = document.getElementById('drawer-close');

    function openDrawer() {
      renderDrawer();
      drawer.classList.add('open');
      backdrop.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
    }
    histBtn.addEventListener('click', openDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    backdrop.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
    });

    newBtn.addEventListener('click', () => {
      if (window.CaseStore) {
        window.CaseStore.closeActive();
      }
      // 챗봇 화면 초기화 (textContent 비우기는 innerHTML 대신 안전한 패턴)
      clearChildren(document.getElementById('chat'));
      welcomeShown = false;
      userCollapsedChips = false;
      showWelcome();
      // Pre-KTAS도 첫 단계로 reset
      try {
        if (window.WizardController && typeof window.WizardController.reset === 'function') {
          window.WizardController.reset();
        } else if (typeof WizardController !== 'undefined' && WizardController.reset) {
          WizardController.reset();
        }
      } catch (e) { /* WizardController가 아직 mount 안 됐을 수 있음 */ }
    });
  }

  function fmtTimestamp(ms) {
    if (!ms) return '';
    const d = new Date(ms);
    const pad = (n) => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
         + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function renderDrawer() {
    const list = document.getElementById('drawer-list');
    const meta = document.getElementById('drawer-meta');
    if (!list || !meta || !window.CaseStore) return;
    const cases = window.CaseStore.list();
    const activeId = (window.CaseStore.getActive() || {}).id;

    meta.textContent = cases.length === 0
      ? '저장된 케이스 없음. 채팅 또는 Pre-KTAS로 평가를 시작하세요.'
      : '총 ' + cases.length + '건 (브라우저 독립 보존, 최대 50건).';

    clearChildren(list);
    if (cases.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'case-empty';
      empty.textContent = '저장된 케이스가 없습니다.';
      list.appendChild(empty);
      return;
    }
    for (const c of cases) {
      const li = document.createElement('li');
      li.className = 'case-item' + (c.id === activeId ? ' active' : '');
      li.dataset.id = c.id;
      const summary = document.createElement('div');
      summary.className = 'ci-summary';
      summary.textContent = c.summary || '(제목 없음)';
      li.appendChild(summary);
      const m = document.createElement('div');
      m.className = 'ci-meta';
      const mode = document.createElement('span');
      mode.className = 'mode-chip';
      mode.textContent = c.input_mode || 'chat';
      m.appendChild(mode);
      const ts = document.createElement('span');
      ts.textContent = fmtTimestamp(c.ts_started);
      m.appendChild(ts);
      const status = document.createElement('span');
      if (c.id === activeId) {
        status.className = 'ci-status-active';
        status.textContent = '진행 중';
      } else if (c.ts_closed) {
        status.textContent = '마감';
      }
      m.appendChild(status);
      li.appendChild(m);
      // 클릭 시 read-only 케이스 보기
      li.addEventListener('click', () => {
        viewCaseReadOnly(c);
      });
      list.appendChild(li);
    }
  }

  // Phase 7+ — 기록 패널 클릭 시 읽기 전용 케이스 보기
  function viewCaseReadOnly(c) {
    if (!c) return;
    // drawer 닫기 (setupCaseControls 클로저 밖이므로 DOM 직접 조작)
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('drawer-backdrop');
    if (drawer) {
      drawer.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
    }
    if (backdrop) backdrop.classList.remove('open');

    const chat = document.getElementById('chat');
    if (!chat) return;
    clearChildren(chat);

    const activeId = (window.CaseStore && window.CaseStore.getActive() || {}).id;
    const isActive = c.id === activeId;
    const status = isActive ? '진행 중' : (c.ts_closed ? '마감' : '미상');

    // 헤더 배너
    const banner = el('div', { className: 'msg bot' });
    const bb = el('div', { className: 'bubble' });
    bb.style.borderLeft = '3px solid var(--t-accent)';
    bb.style.fontSize = 'var(--fs-sm)';
    bb.style.color = 'var(--t-dim)';
    bb.style.background = 'var(--t-surface)';
    bb.textContent = '📋 케이스 보기 (' + status + ') — ' + (c.summary || c.id) + ' · ' + fmtTimestamp(c.ts_started);
    banner.appendChild(bb);
    chat.appendChild(banner);

    const msgs = Array.isArray(c.messages) ? c.messages : [];
    let printed = 0;
    for (const m of msgs) {
      if (!m || !m.content) continue;
      const role = m.role === 'user' ? 'user' : 'bot';
      const div = el('div', { className: 'msg ' + role });
      const b = el('div', { className: 'bubble' });
      b.style.whiteSpace = 'pre-wrap';
      b.textContent = m.content;
      div.appendChild(b);
      chat.appendChild(div);
      printed++;
    }

    if (printed === 0) {
      const empty = el('div', { className: 'msg bot' });
      const eb = el('div', { className: 'bubble' });
      eb.style.color = 'var(--t-dim)';
      eb.style.fontSize = 'var(--fs-sm)';
      eb.textContent = '이 케이스에는 저장된 메시지가 없습니다.';
      empty.appendChild(eb);
      chat.appendChild(empty);
    }

    // 활성과 다르면 안내 (사용자가 새 메시지 입력 시 어디로 가는지 모호하지 않게)
    if (!isActive) {
      const note = el('div', { className: 'msg bot' });
      const nb = el('div', { className: 'bubble' });
      nb.style.background = 'var(--t-surface)';
      nb.style.borderLeft = '3px solid var(--t-line)';
      nb.style.color = 'var(--t-dim)';
      nb.style.fontSize = 'var(--fs-xs)';
      nb.textContent = '※ 마감된 케이스를 보고 있습니다. 새 메시지를 입력하면 활성 케이스에 추가됩니다. 새 케이스로 시작하려면 헤더의 [🆕 새 케이스]를 누르세요.';
      note.appendChild(nb);
      chat.appendChild(note);
    }

    // 스크롤은 가장 최근 메시지로
    if (typeof scrollChat === 'function') scrollChat();
  }

  function buildRibbons() {
    const regionRibbon = document.getElementById('region-ribbon');
    const diseaseRibbon = document.getElementById('disease-ribbon');

    REGIONS.forEach(r => {

  // 좌우 화살표 + 마우스 드래그 스크롤 가능하게 강화
  function enhanceRibbonScroll(rowEl) {
    if (!rowEl || rowEl.dataset.enhanced === '1') return;
    rowEl.dataset.enhanced = '1';

    const wrap = document.createElement('div');
    wrap.className = 'ribbon-wrap';
    rowEl.parentNode.insertBefore(wrap, rowEl);
    wrap.appendChild(rowEl);

    const left = document.createElement('button');
    left.type = 'button';
    left.className = 'ribbon-arrow ribbon-arrow-left';
    left.setAttribute('aria-label', '왼쪽으로 스크롤');
    left.textContent = '‹';
    wrap.appendChild(left);

    const right = document.createElement('button');
    right.type = 'button';
    right.className = 'ribbon-arrow ribbon-arrow-right';
    right.setAttribute('aria-label', '오른쪽으로 스크롤');
    right.textContent = '›';
    wrap.appendChild(right);

    function updateArrows() {
      const sl = rowEl.scrollLeft;
      const max = rowEl.scrollWidth - rowEl.clientWidth;
      left.classList.toggle('show', sl > 4);
      right.classList.toggle('show', max > 4 && sl < max - 4);
    }
    function step(dir) {
      const w = rowEl.clientWidth || 240;
      rowEl.scrollBy({ left: dir * Math.max(160, Math.floor(w * 0.7)), behavior: 'smooth' });
    }
    left.addEventListener('click', () => step(-1));
    right.addEventListener('click', () => step(1));
    rowEl.addEventListener('scroll', updateArrows, { passive: true });
    window.addEventListener('resize', updateArrows);

    // 마우스/포인터 드래그 스크롤 — capture 미사용.
    // setPointerCapture를 쓰면 자식 .ribbon-btn으로 click이 가지 않으므로
    // window-level pointermove/pointerup으로 처리한다. 임계값(8px)을 넘기 전엔
    // dragging 상태도 표시하지 않아 일반 클릭에 영향이 없다.
    const DRAG_THRESHOLD = 8;
    let dragging = false;
    let startX = 0;
    let startScroll = 0;
    let moved = false;
    rowEl.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      dragging = true;
      moved = false;
      startX = e.clientX;
      startScroll = rowEl.scrollLeft;
    });
    function onMove(e) {
      if (!dragging) return;
      const dx = e.clientX - startX;
      if (!moved && Math.abs(dx) > DRAG_THRESHOLD) {
        moved = true;
        rowEl.classList.add('dragging');
      }
      if (moved) rowEl.scrollLeft = startScroll - dx;
    }
    function onUp() {
      if (!dragging) return;
      const wasMoved = moved;
      dragging = false;
      moved = false;
      rowEl.classList.remove('dragging');
      if (wasMoved) {
        const suppress = (ev) => {
          ev.stopPropagation();
          ev.preventDefault();
        };
        rowEl.addEventListener('click', suppress, { capture: true, once: true });
        setTimeout(() => rowEl.removeEventListener('click', suppress, true), 80);
      }
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);

    // 초기 화살표 상태
    setTimeout(updateArrows, 0);
  }

  function selectRegion(code, btn) {
    document.querySelectorAll('#region-ribbon .ribbon-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedRegion = code;
    tryRibbonSearch();
  }

  function selectDisease(codes, btn) {
    document.querySelectorAll('#disease-ribbon .ribbon-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDisease = codes;
    tryRibbonSearch();
  }

  function tryRibbonSearch() {
    if (!selectedRegion || !selectedDisease) return;
    if (isLoading) return;
    const regionName = REGION_NAMES[selectedRegion];
    const diseaseName = DISEASE_CATEGORIES.find(d => d.codes === selectedDisease)?.name || '';
    const text = regionName + ' ' + diseaseName;
    appendUserBubble(text);
    searchAndShow(text, selectedRegion, selectedDisease);
    setTimeout(() => {
      document.querySelectorAll('.ribbon-btn').forEach(b => b.classList.remove('selected'));
      selectedRegion = null;
      selectedDisease = null;
    }, 500);
  }

    const wrap = el('div', { style: 'text-align:center;padding:32px 16px 16px' });
    const title = el('div', { style: 'font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.5px' });
    title.textContent = '중증응급질환 병원 찾기';

  function buildChips() {
    const chipsList = document.getElementById('chips-list');
    chipsList.innerHTML = '';
    const shuffled = [...CASES].sort(() => Math.random() - 0.5).slice(0, 3);
    shuffled.forEach(c => {
      const btn = el('button', { className: 'chip', textContent: c.text });
      btn.addEventListener('click', () => {
        if (isLoading) return;
        appendUserBubble(c.text);
        searchAndShow(c.text, c.region, c.diseases);
      });
      chipsList.appendChild(btn);
    });
  }

  function expandChips() {
    // 사용자가 수동으로 접은 경우 강제 펼침 안 함
    if (userCollapsedChips) return;
    document.getElementById('chips-bar').classList.remove('chips-collapsed');
  }

  function collapseChips() {
    document.getElementById('chips-bar').classList.add('chips-collapsed');
  }

  // ── 메시지 전송 ──────────────────────────────────

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    appendUserBubble(text);
    setLoading(true);

    try {
      // 1단계: 키워드 매칭 시도 (즉시, LLM 불필요)
      let parsed = keywordFallback(text);

      // Phase 7+ — Follow-up 라우팅:
      // 활성 케이스에 직전 추천(hospitals_snapshot)이 있고, 새 입력에 명시적 region+disease가
      // 보이지 않으면 follow-up 모드로 LLM에 컨텍스트 보존 답변을 위임한다.
      // (사용자가 다시 region·disease를 명시하면 새 검색으로 흐른다.)
      const kwFailed = !parsed.region || !parsed.diseases || !parsed.diseases.length;
      const active = window.CaseStore && window.CaseStore.getActive();
      const isFollowUpContext = !!(active && active.hospitals_snapshot && Array.isArray(active.messages) && active.messages.length > 1);
      if (kwFailed && aiEnabled && isFollowUpContext) {
        const handled = await runFollowUp(text);
        if (handled) return;
        // handled === false (case 컨텍스트 비어있음)이면 기존 파싱 흐름으로 떨어짐
      }

      // 2단계: 키워드 실패 + AI on → LLM 파싱
      if (kwFailed && aiEnabled) {
        parsed = await parseWithLLM(text);
        // Phase 7 — LLM 실패 시 폴백 없이 에러 카드 노출
        if (parsed && parsed._llmError) {
          appendBotNode(renderLLMError({
            error: parsed,
            onRetry: function() {
              // 같은 입력 텍스트로 재시도 (입력창은 비어있으므로 직접 호출)
              const retryInput = document.getElementById('user-input');
              if (retryInput) retryInput.value = text;
              sendMessage();
            },
          }));
          return;
        }
      }

      const hasRegion = parsed && parsed.region;
      const hasDiseases = parsed && parsed.diseases && parsed.diseases.length;

      if (hasRegion && hasDiseases) {
        // 완전 매칭 → 검색
        const clarify = checkSeverityClarification(parsed.diseases, text);
        if (clarify) {
          renderClarification(clarify, parsed.region, text);
        } else {
          await searchAndShow(text, parsed.region, parsed.diseases.join(','));
        }
      } else if (hasRegion && !hasDiseases) {
        // 지역만 매칭 → 질환 코드 없이 병상 조회
        await searchAndShow(text, parsed.region, '');
      } else {
        // 매칭 실패 → 안내
        renderParseGuide(hasRegion, hasDiseases, parsed);
      }
    } catch (e) {
      const wrap = el('div', { className: 'bubble' });
      wrap.textContent = '죄송합니다, 요청을 처리하는 중 오류가 발생했어요. 다시 시도해주세요.';
      appendBotNode(wrap);
      console.error(e);
    } finally {
      setLoading(false);
    }
  }

  function renderParseGuide(hasRegion, hasDiseases, parsed) {
    const wrap = el('div', { className: 'bubble' });
    if (!hasRegion && hasDiseases) {
      wrap.appendChild(document.createTextNode('어느 지역인가요? 위 지역 리본에서 선택하거나, 지역명을 포함해서 다시 입력해주세요.'));
    } else if (hasRegion && !hasDiseases) {
      wrap.appendChild(document.createTextNode('어떤 응급 상황인가요? 질환 리본에서 선택하거나, 증상을 포함해서 다시 입력해주세요.'));
    } else {
      const intro = el('div', { style: 'line-height:1.8' });
      intro.appendChild(document.createTextNode('지역과 증상을 함께 말씀해주세요.'));
      intro.appendChild(el('br'));
      const hint = el('small', { style: 'color:var(--muted)' });
      hint.textContent = '예: "대구 심근경색", "서울 분만" 또는 위 리본에서 선택';
      intro.appendChild(hint);
      wrap.appendChild(intro);
    }
    appendBotNode(wrap);
  }

  // ── HARNESS 시스템 프롬프트 ──────────────────────────────────

  const HARNESS_PARSE_PROMPT = `당신은 119 구급대원을 위한 응급의료 AI입니다. 사용자 요청에서 지역코드와 질환코드를 추출하세요.

## 지역코드

### 2. 복수 질환 매트릭스
여러 코드 조회 시 병원마다 가능한 시술이 다름. "전부 가능한 곳" > "일부만 가능한 곳" 순서로 추천. 어떤 시술이 가능/불가인지 명시.

- rule_based: { mappability, initial_y_candidates, narrowed_y_candidates, confident_y_candidates, candidate_y_candidates, c_tier_codes, y_excluded_with_reason, tier_recommendation, equipment_dimensions, cpr_special } — 규칙 기반 중증응급질환 판정 결과 (내부 식별용)

### mappability 해석 (v0.3)
- "A" — 코드와 답변만으로 시술 적응이 명확. confident_y_candidates를 그대로 신뢰하고 "확정 시술" 표현.
- "B" — 후보로 좁혔으나 단정 불가. candidate_y_candidates를 "가능성 있는 시술 후보"로 표현. 병원 검사 후 결정 명시.
- "C" — 현장 정보로 Y코드 단정 무리. c_tier_codes는 **시술 후보가 아니다** — 등급 결정 근거로만 내부 사용. **사용자에게 c_tier_codes 안의 시술명을 절대 노출하지 마라** (·복부 응급수술·, ·담낭 응급·, ·복부 대동맥 응급· 같은 단정 표현 금지). 대신 "응급도와 등급만" 표현. (예: 담낭/담도 환자는 영상 검사 전 단정 불가)
- "unmapped" — 27개 시술 외. grade 기반 등급 권고만.

### equipment_dimensions 해석 (v0.3)
환자 답변에서 추출된 장비/병상 차원 태그. 다음 매핑으로 EMRIS 병상 정보와 연결:

- "nicu_required" → NICU 가용 (childEmergencyAvailable로 부분 추정)
- "delivery_room_required" → deliveryRoomAvailable 가용성 필수
- "icu_required" → 중환자실 카테고리 (EP-06/EP-07)
- "hypothermia_treatment" → 권역응급의료센터 직송 권고
- "nearest_facility" → ROSC 미달성: 가장 가까운 병원 (등급 무관)

- "obstetric_surgery" → ·산과 응급수술· 가능 병원 (Y0112 EP-08)

  async function parseWithLLM(userText) {

          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-emris-token': EMRIS_API_KEY },
          body: JSON.stringify({
            messages: [{ role: 'user', content: userText }],

        });

        return { ok: false, kind: 'network', message: String(e && e.message ? e.message : e), retryable: true };
      }
      if (resp.status === 401 || resp.status === 403) return { ok: false, kind: 'auth', status: resp.status, retryable: false };
      if (resp.status === 429) return { ok: false, kind: 'rate_limit', status: resp.status, retryable: false };
      if (resp.status >= 500) return { ok: false, kind: '5xx', status: resp.status, retryable: true };
      if (!resp.ok) return { ok: false, kind: '4xx', status: resp.status, retryable: false };
      let data;
      try { data = await resp.json(); }
      catch (e) { return { ok: false, kind: 'parse', message: 'JSON 응답 파싱 실패', retryable: true }; }
      const raw = (data.content?.[0]?.text || '').trim().replace(/```json?|```/g, '').trim();
      try {
        return { ok: true, data: JSON.parse(raw) };
      } catch (e) {
        return { ok: false, kind: 'parse', message: 'LLM 출력 JSON 파싱 실패', retryable: true };
      }
    });

  function crossValidateOne(h, diseases, now) {

  function parseTimeRestriction(text, now) {
    // "21시~익일 5시 불가" 패턴
    const m = text.match(/(\d{1,2})시\s*~\s*(익일\s*)?(\d{1,2})시\s*(불가|제한)/);
    if (m) {
      const start = parseInt(m[1]);
      const end = parseInt(m[3]);
      const isOvernight = !!m[2] || end < start;
      const hour = now.getHours();
      let restricted;
      if (isOvernight) {
        restricted = hour >= start || hour < end;
      } else {
        restricted = hour >= start && hour < end;
      }
      return { restricted, reason: `${m[1]}시~${m[2]||''}${m[3]}시 ${m[4]}` };
    }

    // "야간/주말 불가" 패턴
    if (/야간.*(불가|제한)|주말.*(불가|제한)/.test(text)) {
      const hour = now.getHours();
      const day = now.getDay();
      const isNight = hour >= 18 || hour < 9;
      const isWeekend = day === 0 || day === 6;
      if (/야간/.test(text) && isNight) return { restricted: true, reason: '야간 진료 불가 (현재 야간)' };
      if (/주말/.test(text) && isWeekend) return { restricted: true, reason: '주말 진료 불가 (현재 주말)' };
      return { restricted: false, reason: null };
    }

    return null;
  }

  function filterByGrade(hospitals, diseases) {
    if (!diseases.length) return { qualified: hospitals, gradeFiltered: 0 };
    const minGrade = diseases.reduce((min, d) => {
      const req = GRADE_REQ[d];
      if (!req) return min;
      const rank = { A: 3, C: 2, D: 1 };
      return rank[req] > rank[min] ? req : min;
    }, 'D');

    if (minGrade === 'D') return { qualified: hospitals, gradeFiltered: 0 };

    const rank = { A: 3, C: 2, D: 1 };
    const minRank = rank[minGrade] || 1;
    const qualified = [];
    let filtered = 0;
    for (const h of hospitals) {
      const hRank = rank[h.grade] || 1;
      // 데이터 우선: 해당 질환에 Y를 보고한 D등급은 포함

      } else {

  function buildPriorityMatrix(hospitals, diseases) {

      const scoreA = matrixScore(a, diseases);
      const scoreB = matrixScore(b, diseases);
      if (scoreA !== scoreB) return scoreA - scoreB;
      const gradeRank = { A: 0, C: 1, D: 2 };
      return (gradeRank[a.grade] || 2) - (gradeRank[b.grade] || 2);

      if (v === 'Y') yCount++;
      else if (v == null) nullCount++;

    if (yCount === diseases.length) return 0; // 전체 Y
    if (yCount > 0) return 1; // 일부 Y
    if (nullCount === diseases.length) return 3; // 전체 null

  function checkEscalation(effectiveAvail, allHospitals, region) {

  function checkSingleFacility(effectiveAvail, region) {

  function detectLinkage(hospitals, diseases) {
    if (diseases.length < 2) return null;

    const hasAllY = hospitals.some(h => {

    const bestPerCode = {};
    for (const d of diseases) {
